@if (products.length === 0) {
  <div class="empty">
    No products in this category (you deleted them all 😄)
  </div>
} @else {
  <div class="grid">
    @for (p of products; track p.id) {
      <app-product-item
        [product]="p"
        (delete)="onDelete($event)"
      ></app-product-item>
    }
  </div>
}
